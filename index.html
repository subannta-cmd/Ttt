    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f4; overflow: hidden; }
        
        .menu-card { transition: all 0.2s; background: white; cursor: pointer; border-radius: 25px; border: 1px solid #f0f0f0; overflow: hidden; height: 100%; }
        
        .menu-card:active { transform: scale(0.95); background-color: #f0fdf4; }
        
        .menu-img-display { width: 100%; height: 110px; object-fit: cover; background: #fafafa; border-bottom: 1px solid #f0f0f0; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        
        .category-header { grid-column: 1 / -1; margin-top: 1.5rem; border-left: 4px solid #166534; padding-left: 0.75rem; margin-bottom: 0.5rem; }
        
        .sweet-btn { border: 2px solid #e5e7eb; padding: 10px; border-radius: 15px; font-size: 14px; cursor: pointer; text-align: center; font-weight: bold; }
        
        .sweet-btn.active { border-color: #f97316; background-color: #fff7ed; color: #f97316; }

        /* แก้ไขตรงนี้: เพิ่มดอกจัน (*) เพื่อให้ครอบคลุมทั้งหน้าจอ */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .category-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #166534;
        }
        
      @media print {
    @page { 
        size: 58mm auto; 
        margin: 0; 
    }

    /* 1. ล้างสีทุกอย่างให้เป็นขาวดำสนิท และซ่อนเนื้อหาทั้งหมดก่อน */
    * {
        color: #000000 !important;
        background-color: #ffffff !important;
        background-image: none !important;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        box-shadow: none !important;
        text-shadow: none !important;
        visibility: hidden;
    }

    /* 2. บังคับให้เฉพาะใบเสร็จและลูกหลานมองเห็น */
    #receipt-area, #receipt-area * {
        visibility: visible;
    }

    body { 
        background: white !important; 
        margin: 0; 
        padding: 0;
        filter: grayscale(100%) !important;
    }

    /* 3. จัดตำแหน่งใบเสร็จและซ่อนส่วนเกิน */
    #receipt-area { 
        display: block !important;
        position: absolute;
        top: 0;
        left: 0;
        width: 100% !important; 
        max-width: 44mm !important; /* บีบให้เล็กลงนิดหน่อยเพื่อให้พิมพ์ในกระดาษ 58mm ได้ครบถ้วน */
        margin: 0 !important; 
        padding: 2mm 2mm 10mm 2mm !important; /* เว้นท้าย 10mm กันใบมีดตัดโดนข้อความ */
        border: none !important;
    }

    /* ปรับโลโก้ให้ดำชัดขึ้น */
    #receipt-area img { 
        width: 30mm !important; 
        height: auto !important;
        filter: grayscale(100%) contrast(2) !important; 
        margin-bottom: 2mm;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    /* เลขคิว */
    #receipt-area #receipt-q { 
        font-size: 36px !important; 
        font-weight: 900 !important;
        border: 3px solid black !important;
        display: inline-block;
        padding: 2mm 5mm;
        margin: 2mm 0;
        color: black !important;
    }

    /* เส้นประรายการ */
    #cart-list > div { 
        border-bottom: 1.5px dashed black !important; 
        padding-bottom: 4px !important; 
        margin-bottom: 4px !important; 
    }

    #total-price {
        font-size: 24px !important;
        font-weight: bold !important;
        color: black !important;
    }

    /* ส่วนท้ายใบเสร็จ */
    #receipt-area::after {
        content: "--- ขอบคุณที่ใช้บริการ ---";
        display: block;
        text-align: center;
        font-size: 10px;
        margin-top: 5mm;
        padding-bottom: 5mm;
        border-top: 1px solid black;
        color: black !important;
    }

    /* บังคับซ่อน Modal และหน้าจอหลักแบบเด็ดขาด */
    .print-hidden, .modal, #admin-panel, #confirm-section, #qr-area, .flex.h-screen {
        display: none !important;
    }
}

        .discount-unit-btn { padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 8px; border: 1px solid #e5e7eb; background: white; color: #9ca3af; }

    </style>
</head>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyx0_BRxbpfWvHV329LA4DdADtithM1BhI25rIgnuZvn981UCPcJ3qLBGUe3XqEvYk1/exec';
        let menuItems = JSON.parse(localStorage.getItem('na_coco_menu')) || [];
        let cart = [];
        let dailyHistory = JSON.parse(localStorage.getItem('na_coco_daily_log')) || [];
        let q = parseInt(localStorage.getItem('na_coco_q')) || 1;
        let discountUnit = '฿';
        let tempLogoData = "";
        let editingIndex = null;
        let selectedSweet = '100%';
        let isOrderConfirmed = false;

        function init() { 
            const savedLogo = localStorage.getItem('na_coco_logo');
            if(savedLogo) {
                document.getElementById('main-logo').src = savedLogo;
                document.getElementById('receipt-logo').src = savedLogo;
                document.getElementById('admin-logo-preview').src = savedLogo;
            }
            document.getElementById('shop-address-display').innerText = localStorage.getItem('na_coco_addr') || "";
            document.getElementById('shop-address-input').value = localStorage.getItem('na_coco_addr') || "";
            document.getElementById('pp-input').value = localStorage.getItem('na_coco_pp') || "";
            document.getElementById('vat-rate-input').value = localStorage.getItem('na_coco_vat') || "0";
            renderApp(); 
            updateCart(); 
        }

        // --- ระบบเมนู ---
        function renderApp() {
            document.getElementById('next-q').innerText = '#' + q.toString().padStart(2, '0');
            document.getElementById('receipt-q').innerText = '#' + q.toString().padStart(2, '0');
            const menuDiv = document.getElementById('menu-sections');
            menuDiv.innerHTML = "";
            const categories = [...new Set(menuItems.map(item => item.category || 'ทั่วไป'))];
            categories.forEach(cat => {
                const header = document.createElement('div');
                header.className = "category-header";
                header.innerHTML = `<h3 class="font-black text-green-800 text-sm uppercase">${cat}</h3>`;
                menuDiv.appendChild(header);
                menuItems.filter(item => (item.category || 'ทั่วไป') === cat).forEach(item => {
                    const card = document.createElement('div');
                    card.className = "menu-card shadow-sm";
                    card.onclick = () => addToCart(item.name, item.price);
                    card.innerHTML = `<img src="${item.img || 'https://via.placeholder.com/200x150?text=Na+COCO'}" class="menu-img-display"><div class="p-3 text-center"><span class="font-bold text-[10px] text-gray-500 block truncate uppercase">${item.name}</span><span class="text-green-600 font-black">${item.price}.-</span></div>`;
                    menuDiv.appendChild(card);
                });
            });
        }

        function addToCart(name, price) { isOrderConfirmed = false; cart.push({name, price, qty: 1, sweet: '100%', note: ''}); updateCart(); }
        function changeQty(idx, delta) { isOrderConfirmed = false; cart[idx].qty += delta; if (cart[idx].qty <= 0) cart.splice(idx, 1); updateCart(); }
        function confirmOrder() { if(cart.length === 0) return; isOrderConfirmed = true; updateCart(); }

        function updateCart() {
            const list = document.getElementById('cart-list');
            const confirmSection = document.getElementById('confirm-section');
            const btnPay = document.getElementById('btn-pay');
            let subtotal = 0;
            list.innerHTML = cart.map((item, idx) => {
                subtotal += (item.price * item.qty);
                return `<div class="bg-white p-3 rounded-xl border shadow-sm"><div class="flex justify-between items-start mb-2"><div onclick="openModifier(${idx})" class="cursor-pointer"><span class="text-xs font-bold block">${item.name}</span><span class="text-[9px] text-orange-500 font-bold uppercase">หวาน ${item.sweet} ${item.note ? '| ' + item.note : ''}</span></div><span class="text-xs font-black">${(item.price * item.qty).toLocaleString()}.-</span></div><div class="flex justify-between items-center print-hidden"><div class="flex items-center gap-3 bg-gray-50 rounded-lg px-2 py-1"><button onclick="changeQty(${idx}, -1)" class="text-orange-500 font-black">-</button><span class="text-xs font-bold w-4 text-center">${item.qty}</span><button onclick="changeQty(${idx}, 1)" class="text-orange-500 font-black">+</button></div><button onclick="cart.splice(${idx},1); isOrderConfirmed=false; updateCart();" class="text-red-200 text-xs"><i class="fas fa-trash"></i></button></div></div>`;
            }).join('');

            if (cart.length > 0 && !isOrderConfirmed) {
                confirmSection.classList.remove('hidden');
                btnPay.disabled = true;
                btnPay.classList.replace('bg-green-600', 'bg-gray-300');
            } else if (isOrderConfirmed) {
                confirmSection.classList.add('hidden');
                btnPay.disabled = false;
                btnPay.classList.replace('bg-gray-300', 'bg-green-600');
                btnPay.classList.remove('cursor-not-allowed');
            }

            const disVal = parseFloat(document.getElementById('discount-val').value) || 0;
            let disAmount = (discountUnit === '%') ? (subtotal * disVal / 100) : disVal;
            const afterDiscount = Math.max(0, subtotal - disAmount);
            const vatRate = parseFloat(localStorage.getItem('na_coco_vat')) || 0;
            const vatAmount = afterDiscount * (vatRate / 100);
            const finalTotal = afterDiscount + vatAmount;

            document.getElementById('sub-total').innerText = subtotal.toLocaleString();
            document.getElementById('txt-dis-label').innerText = disVal + discountUnit;
            document.getElementById('txt-dis-amount').innerText = Math.round(disAmount).toLocaleString();

        async function handleCheckout() {
    if (cart.length === 0 || !isOrderConfirmed) return;

    const timeStr = new Date().toLocaleString('th-TH');
    const finalTotal = parseFloat(document.getElementById('total-price').innerText.replace(/,/g, ''));
    const vatAmount = parseFloat(document.getElementById('txt-vat-amount').innerText.replace(/,/g, ''));
    const note = document.getElementById('receipt-note').value;

    // --- ส่วนที่ 1: การพิมพ์ผ่าน Bluetooth แบบรูปภาพ (เพื่อให้มี Logo + QR) ---
    if (btCharacteristic) {
        try {
            // อัปเดตวันที่ในหน้าใบเสร็จบนจอก่อนถ่ายภาพ
            document.getElementById('cur-date').innerText = timeStr;
            const receiptArea = document.getElementById('receipt-area');

            // ถ่ายรูปส่วนใบเสร็จ (ต้องมี html2canvas library)
            const canvas = await html2canvas(receiptArea, {
                scale: 2, // ความคมชัดที่เหมาะสม
                useCORS: true,
                backgroundColor: "#ffffff"
            });

            // เรียกใช้ฟังก์ชันในข้อ 2 เพื่อพิมพ์ภาพ
            await printImageViaBluetooth(canvas);
            
            // สั่ง Feed กระดาษเพิ่ม 3 บรรทัดกันโดนตัด
            await btCharacteristic.writeValue(new Uint8Array([0x1B, 0x64, 0x03])); 
        } catch (err) {
            console.error("Bluetooth Print Error:", err);
        }
    }

    // --- ส่วนที่ 2: บันทึกข้อมูล (Sheets & History) ---
    dailyHistory.push({ 
        type: 'SALE', 
        time: new Date().toLocaleTimeString('th-TH'), 
        amount: finalTotal, 
        q: q 
    });
    localStorage.setItem('na_coco_daily_log', JSON.stringify(dailyHistory));

    // ส่งข้อมูลไป Google Sheets
    const summaryMap = {};
    cart.forEach(item => { summaryMap[item.name] = (summaryMap[item.name] || 0) + item.qty; });
    const itemsText = Object.entries(summaryMap).map(([n, q]) => `${n}(${q})`).join(', ');

    try {
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({
                timestamp: timeStr,
                items: itemsText,
                amount: finalTotal,
                vat_amount: vatAmount,
                note: note
            })
        });
    } catch (e) {
        console.error("Sheet Error:", e);
    }

    // ล้างข้อมูลและเริ่มคิวใหม่
    setTimeout(() => {
        q++;
        localStorage.setItem('na_coco_q', q);
        clearCart();
        renderApp();
    }, 2000);
}

async function printImageViaBluetooth(canvas) {
    const ctx = canvas.getContext('2d');
    const width = canvas.width;
    const height = canvas.height;
    const imgData = ctx.getImageData(0, 0, width, height).data;

    // แปลงภาพเป็นขาวดำ (Threshold)
    const pixels = [];
    for (let i = 0; i < imgData.length; i += 4) {
        // คำนวณค่าความสว่างเฉลี่ย
        const avg = (imgData[i] + imgData[i + 1] + imgData[i + 2]) / 3;
        pixels.push(avg < 128 ? 1 : 0); // ถ้ามืดให้เป็นสีดำ (1) ถ้าสว่างให้เป็นสีขาว (0)
    }

    const widthBytes = Math.ceil(width / 8);
    const data = new Uint8Array(8 + widthBytes * height);
    
    // คำสั่ง ESC/POS มาตรฐานสำหรับพิมพ์รูปภาพ (GS v 0)
    data[0] = 0x1D; data[1] = 0x76; data[2] = 0x30; data[3] = 0x00;
    data[4] = widthBytes & 0xFF; data[5] = (widthBytes >> 8) & 0xFF;
    data[6] = height & 0xFF; data[7] = (height >> 8) & 0xFF;

    let pos = 8;
    for (let y = 0; y < height; y++) {
        for (let x = 0; x < widthBytes; x++) {
            let byte = 0;
            for (let bit = 0; bit < 8; bit++) {
                if (pixels[y * width + x * 8 + bit]) {
                    byte |= (1 << (7 - bit));
                }
            }
            data[pos++] = byte;
        }
    }
    // ส่งข้อมูลภาพไปยังเครื่องพิมพ์ผ่าน Bluetooth
    await btCharacteristic.writeValue(data);
}

    const reportData = {
        type: "DAILY_REPORT",
        date: new Date().toLocaleDateString('th-TH'),
        totalSales: sales,
        totalExpense: exps,
        netAmount: sales - exps,
        expenseNote: expDetails.join(', ')
    };

    try {
        await fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',

        });

}

        }
        function processImage(input, type, idx = null) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const data = canvas.toDataURL('image/jpeg', 0.7);
                        if (type === 'logo') { tempLogoData = data; document.getElementById('admin-logo-preview').src = data; }
                        else if (idx !== null) { menuItems[idx].img = data; renderAdminMenu(); }
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }

// 1. ประกาศตัวแปรไว้ด้านนอกสุด (เหลืออันเดียว)
let btCharacteristic = null;

// 2. ฟังก์ชันเชื่อมต่อบลูทูธ
async function connectBluetooth() {
    try {
        const device = await navigator.bluetooth.requestDevice({
            filters: [{ services: ['000018f0-0000-1000-8000-00805f9b34fb'] }],
            optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb']
        });
        
        const server = await device.gatt.connect();
        const service = await server.getPrimaryService('000018f0-0000-1000-8000-00805f9b34fb');
        
        const characteristics = await service.getCharacteristics();
        btCharacteristic = characteristics.find(c => 
            c.properties.write || c.properties.writeWithoutResponse
        );

        if (btCharacteristic) {
            document.getElementById('bt-status').classList.replace('text-gray-400', 'text-blue-500');
            alert('เชื่อมต่อเครื่องพิมพ์ ณ Coco สำเร็จแล้วครับ! 🌴');
        }
    } catch (e) {
        console.error("Bluetooth Error:", e);
        alert('เชื่อมต่อไม่ได้: ' + e.message);
    }
}

// 3. ฟังก์ชันสำหรับส่งข้อมูล
async function sendToPrinter(data) {
    if (!btCharacteristic) return;
    for (let i = 0; i < data.length; i += 20) {
        await btCharacteristic.writeValue(data.slice(i, i + 20));
    }
}

// 4. ฟังก์ชันพิมพ์แบบข้อความ
async function printViaBluetooth(text) {
    if (!btCharacteristic) return;
    const encoder = new TextEncoder();
    const data = encoder.encode(text + '\n\n\n\n\n'); 
    await sendToPrinter(data);
}
